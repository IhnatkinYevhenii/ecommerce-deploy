apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  labels:
    app: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce
  template:
    metadata:
      labels:
        app: ecommerce
    spec:
      containers:
      - name: ecommerce-app
        # Зверни увагу: використовуємо згенерований у Lab 2 образ з GHCR
        image: ghcr.io/<твій-github-username>/ecommerce-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        
        # Автоматичне затягування ВСІХ змінних з ConfigMap та Secret
        envFrom:
        - configMapRef:
            name: ecommerce-config
        - secretRef:
            name: ecommerce-secret

        # Перевірки здоров'я застосунку (Self-healing)
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-app-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: ecommerce
