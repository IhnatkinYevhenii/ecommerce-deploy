name: Lab 4 Grading

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Встановлюємо Helm у хмарне середовище
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      # Запускаємо автоматичну перевірку
      - name: Run Helm Grading Script
        run: |
          chmod +x ./tests/lab4_test.sh
          ./tests/lab4_test.sh
